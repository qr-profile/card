<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة التواصل - Omar Abul-Azayem</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --gold: #c9a84c;
    --card-bg: #1a1a1a;
    --text: #f0ece0;
    --muted: #888;
    --border: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 420px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card::after {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .profile-section {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
  }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gold);
  }
  .profile-info h1 {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 22px;
  }
  .contact-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 14px;
    background: #111;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }
  .contact-item:hover {
    border-color: var(--gold);
    background: #1a1a0d;
    transform: translateX(-2px);
  }
  .contact-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 22px; height: 22px; display: block; }

  .icon-phone { background: rgba(46,204,113,0.12); }
  .icon-wa    { background: rgba(37,211,102,0.12); }
  .icon-fb    { background: rgba(66,103,178,0.15); }
  .icon-li    { background: rgba(10,102,194,0.15); }
  .icon-ig    { background: rgba(225,48,108,0.12); }

  .contact-text { flex: 1; }
  .contact-text .label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }
  .contact-text .value {
    font-size: 14px;
    font-weight: 700;
    direction: ltr;
    color: #fff;
  }
  .arrow { font-size: 16px; color: var(--muted); opacity: 0; transition: opacity 0.2s; }
  .contact-item:hover .arrow { opacity: 1; }

  .qr-section { text-align: center; }
  .qr-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: block;
  }
  #qrcode {
    display: inline-block;
    padding: 12px;
    background: #fff;
    border-radius: 14px;
  }
</style>
</head>
